apiVersion: apps/v1
kind: Deployment
metadata:
  name: dijital-imza-deployment
  labels:
    app: dijital-imza
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dijital-imza
  template:
    metadata:
      labels:
        app: dijital-imza
    spec:
      containers:
      - name: dijital-imza-container
        image: dijital-imza:latest
        imagePullPolicy: Never  # Minikube içerisindeki yerel imajı kullanmak için
        ports:
        - containerPort: 5000
        env:
        - name: SECRET_KEY
          value: "k8s-secret-key-dijital-imza-2026"
        - name: FLASK_ENV
          value: "production"
        - name: FLASK_DEBUG
          value: "0"
        volumeMounts:
        - name: storage-volume
          mountPath: /app/storage
        - name: instance-volume
          mountPath: /app/instance
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "200m"
      volumes:
      - name: storage-volume
        emptyDir: {}
      - name: instance-volume
        emptyDir: {}
