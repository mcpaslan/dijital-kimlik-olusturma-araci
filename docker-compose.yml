version: '3.8'

services:
  web:
    build: .
    container_name: dijital-imza-app
    ports:
      - "5002:5000"
    
    volumes:
      - ./storage:/app/storage
      - ./instance:/app/instance
    
    environment:
      - SECRET_KEY=dev-secret-key-dijital-imza-2026
      - FLASK_ENV=production
      - FLASK_DEBUG=0
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    restart: unless-stopped
    
    # Logging konfigurasyonu
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Opsiyonel: network tanımı
    networks:
      - dijital-imza-network

# Network tanımı
networks:
  dijital-imza-network:
    driver: bridge

# Volumes
volumes:
  storage:
  instance:
